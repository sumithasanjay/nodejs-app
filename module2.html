           height: 150px;
           width: 150px;
           justify-content: center;
           align-items: center;
           color: white;
           background-color: blueviolet;
        }
    </style>

          </head>
        <body>
            <div class="container">
                <div class="cards">Watch</div>
                <div class="cards">Telephone</div>
                <div class="cards">Television</div>

                <div class="cards">Fridge</div>
                <div class="cards">Motor</div>
            </div>
        </body>
  
</html>
